# HBU-YOLO-VLM Base Configuration
# Hierarchical Bidirectional Uncertainty-Aware YOLO-VLM Fusion

# Model Architecture
model:
  num_classes: 5  # disaster-related classes (building, vehicle, person, debris, vegetation)
  num_anchors: 3
  input_size: [512, 512]

# YOLO Backbone Configuration
yolo:
  model_size: "yolov8m.pt"  # Options: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
  pretrained: true
  freeze_backbone: false
  freeze_epoch: 5  # Freeze backbone for first N epochs

# VLM Configuration
vlm:
  vision_model: "openai/clip-vit-large-patch14"
  llm_model: "lmsys/vicuna-7b-v1.5"  # Or "mistralai/Mistral-7B-Instruct-v0.1"
  tokenizer: "lmsys/vicuna-7b-v1.5"
  projection_type: "mlp"  # Options: linear, mlp, resampler
  freeze_vision_encoder: true
  unfreeze_vision_layers: 0  # Unfreeze last N layers
  freeze_llm: false
  lora_enabled: true
  lora_rank: 64
  lora_alpha: 128
  lora_dropout: 0.1

# Fusion Configuration
fusion:
  vlm_hidden_size: 4096
  vlm_num_layers: 32
  num_heads: 8
  fusion_type: "cross_attention"  # Options: cross_attention, adaptive_ln, gating
  
  # Hierarchical layer assignments
  layer_assignments:
    P2: [0, 6]    # Layers 1-6 (tiny details)
    P3: [6, 12]   # Layers 7-12 (small objects)
    P4: [12, 20]  # Layers 13-20 (medium)
    P5: [20, 26]  # Layers 21-26 (large)
    P6: [26, 32]  # Layers 27-32 (context)

# Uncertainty Configuration
uncertainty:
  threshold_low: 0.3
  threshold_high: 0.7
  num_routing_paths: 3
  calibration_enabled: true

# Bidirectional Refinement Configuration
refinement:
  num_iterations: 3
  early_stopping: true
  early_stopping_threshold: 0.005
  convergence_window: 2

# Loss Weights
loss:
  box_weight: 5.0
  cls_weight: 1.0
  lm_weight: 1.0
  unc_weight: 0.5
  focal_loss_gamma: 2.0
  iou_loss_type: "ciou"  # Options: iou, giou, ciou, diou

# Dataset Configuration
dataset:
  name: "xbd"  # Options: xbd, rescuenet, floodnet, combined
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  augmentations:
    enabled: true
    hflip: 0.5
    vflip: 0.0
    rotation: 15
    scale: 0.2
    color_jitter: 0.3
    random_crop: true
    normalize: true

# Data Loading
data:
  train_data_dir: "datasets/xBD/train"
  val_data_dir: "datasets/xBD/val"
  test_data_dir: "datasets/xBD/test"
  num_workers: 8
  pin_memory: true
  persistent_workers: true

# Training Configuration
training:
  # Batch size (per GPU)
  batch_size: 8
  
  # Training duration
  num_epochs: 100
  warmup_epochs: 5
  
  # Optimizer
  optimizer: "adamw"
  base_lr: 0.0001
  weight_decay: 0.05
  clip_grad_norm: 1.0
  
  # Learning rate schedule
  lr_scheduler: "cosine"
  lr_min: 0.00001
  warmup_lr: 0.00001
  
  # Gradient accumulation
  gradient_accumulation_steps: 1
  
  # Mixed precision
  mixed_precision: true
  amp_dtype: "float16"  # Options: float16, bfloat16
  
  # Gradient checkpointing (saves memory)
  gradient_checkpointing: true

# Multi-GPU Configuration (8×A6000)
distributed:
  enabled: true
  backend: "nccl"
  find_unused_parameters: false
  broadcast_buffers: true
  
  # DeepSpeed configuration (for 8-GPU training)
  deepspeed:
    enabled: false  # Enable for very large models
    stage: 2  # ZeRO-2 for balance of speed and memory
    offload_optimizer: false
    offload_param: false
    gradient_accumulation_steps: 1
    train_batch_size: 64
    train_micro_batch_size_per_gpu: 8

# Validation Configuration
validation:
  val_interval: 1  # Validate every N epochs
  save_best: true
  metric: "map"  # Options: map, loss, accuracy
  
  # Evaluation metrics
  metrics:
    - "map_50"
    - "map_75"
    - "map"
    - "precision"
    - "recall"
    - "bleu_4"
    - "rouge_l"

# Checkpoint Configuration
checkpoint:
  save_interval: 5
  save_last: true
  save_best: true
  keep_last_n: 3
  resume_from: null
  load_pretrained: null

# Logging Configuration
logging:
  project_name: "HBU-YOLO-VLM"
  run_name: null  # Auto-generated if null
  log_interval: 10
  tensorboard: true
  wandb: true
  wandb_entity: null
  wandb_tags:
    - "disaster"
    - "uav"
    - "vlm"
    - "yolo"
  
  # Log images
  log_images: true
  log_images_interval: 100

# Output Configuration
output:
  output_dir: "checkpoints/hbu_yolo_vlm"
  log_dir: "logs"
  results_dir: "results"

# Hardware Configuration
hardware:
  num_gpus: 8
  gpu_ids: [0, 1, 2, 3, 4, 5, 6, 7]
  cpu_offload: false

# Inference Configuration
inference:
  confidence_threshold: 0.5
  nms_threshold: 0.5
  max_detections: 100
  caption_enabled: true
  uncertainty_threshold: 0.7

# Seed for reproducibility
seed: 42
